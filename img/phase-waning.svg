<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="wnbase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1830"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="wnlit" cx="35%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f0e8b0"/>
      <stop offset="40%" stop-color="#d8b840"/>
      <stop offset="75%" stop-color="#a87818"/>
      <stop offset="100%" stop-color="#6a4808"/>
    </radialGradient>
    <radialGradient id="wnglow" cx="32%" cy="44%" r="45%">
      <stop offset="0%" stop-color="#d8b830" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#a07818" stop-opacity="0"/>
    </radialGradient>
    <filter id="wnf"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="wnstar"><feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glow behind lit side (left) -->
  <ellipse cx="128" cy="148" rx="95" ry="95" fill="url(#wnglow)" filter="url(#wnf)"/>

  <!-- Dark base circle -->
  <circle cx="150" cy="150" r="92" fill="url(#wnbase)"/>

  <!-- Lit crescent (left side) -->
  <path d="M150 58 C108 58 72 100 72 150 C72 200 108 242 150 242 C128 222 116 188 116 150 C116 112 128 78 150 58Z"
        fill="url(#wnlit)" opacity="0.82"/>

  <!-- Outline -->
  <circle cx="150" cy="150" r="92" fill="none" stroke="#706018" stroke-width="1.2" opacity="0.42"/>
  <path d="M150 58 C108 58 72 100 72 150 C72 200 108 242 150 242 C128 222 116 188 116 150 C116 112 128 78 150 58Z"
        fill="none" stroke="#e8d060" stroke-width="0.8" opacity="0.38"/>

  <!-- Stars on dark side + around -->
  <circle cx="238" cy="82"  r="2.8" fill="#d0c8e8" filter="url(#wnstar)" opacity="0.68"/>
  <circle cx="255" cy="158" r="2.2" fill="#d0c8e8" filter="url(#wnstar)" opacity="0.62"/>
  <circle cx="228" cy="232" r="2.5" fill="#d0c8e8" filter="url(#wnstar)" opacity="0.62"/>
  <circle cx="150" cy="28"  r="2"   fill="#c8c0e0" opacity="0.52"/>
  <circle cx="48"  cy="62"  r="2"   fill="#c8c0e0" opacity="0.5"/>
  <circle cx="190" cy="40"  r="1.5" fill="#c0b8d8" opacity="0.46"/>
  <circle cx="272" cy="120" r="1.5" fill="#c0b8d8" opacity="0.44"/>
  <circle cx="205" cy="258" r="1.8" fill="#c0b8d8" opacity="0.46"/>
  <circle cx="40"  cy="200" r="1.5" fill="#c0b8d8" opacity="0.42"/>
</svg>
