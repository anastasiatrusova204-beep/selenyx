<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <defs>
    <radialGradient id="bg" cx="65%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7ec89a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a4a28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#a8e8b8" stop-opacity="0.35"/>
