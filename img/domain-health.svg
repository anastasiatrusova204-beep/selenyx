  <path d="M161 86 Q168 82 173 78" stroke="#2a5e38" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M155 100 Q160 96 165 92" stroke="#2a5e38" stroke-width="0.9" fill="none" opacity="0.3"/>

