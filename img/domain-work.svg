<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <defs>
    <linearGradient id="c1" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#fff8c0"/>
      <stop offset="30%" stop-color="#f0d060"/>
      <stop offset="65%" stop-color="#c08020"/>
      <stop offset="100%" stop-color="#6a3c08"/>
    </linearGradient>
    <linearGradient id="c2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f8e880"/>
      <stop offset="45%" stop-color="#d4a030"/>
      <stop offset="100%" stop-color="#7a4c10"/>
    </linearGradient>
    <linearGradient id="c3" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#ffe090"/>
      <stop offset="50%" stop-color="#b87020"/>
      <stop offset="100%" stop-color="#5a3008"/>
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="gf2"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>

  <!-- Атмосферное свечение -->
  <ellipse cx="165" cy="55" rx="92" ry="72" fill="url(#glow)"/>
  <ellipse cx="175" cy="40" rx="48" ry="38" fill="#fde68a" opacity="0.14" filter="url(#gf)"/>

  <!-- Маленький кристалл сзади слева -->
  <polygon points="108,32 130,58 122,110 94,110 86,58" fill="url(#c3)" opacity="0.45"/>
  <polygon points="108,32 130,58 108,65" fill="#fff0a0" opacity="0.30"/>
  <polygon points="108,32 86,58 108,65"  fill="#a06820" opacity="0.22"/>
  <polygon points="108,32 130,58 122,110 94,110 86,58" fill="none" stroke="#c8960a" stroke-width="1.2" opacity="0.6"/>

  <!-- Средний кристалл -->
  <polygon points="150,12 184,50 170,116 130,116 116,50" fill="url(#c2)" opacity="0.58"/>
  <polygon points="150,12 184,50 150,60" fill="#fff8a0" opacity="0.36"/>
  <polygon points="150,12 116,50 150,60" fill="#b07820" opacity="0.26"/>
  <polygon points="150,60 184,50 170,116 130,116 116,50" fill="#c08018" opacity="0.14"/>
  <polygon points="150,12 184,50 170,116 130,116 116,50" fill="none" stroke="#d4a820" stroke-width="1.8" opacity="0.72"/>

  <!-- Главный большой кристалл -->
  <polygon points="190,4 220,46 206,120 174,120 160,46" fill="url(#c1)" opacity="0.68"/>
  <polygon points="190,4 220,46 190,56" fill="#fffce8" opacity="0.42"/>
  <polygon points="190,4 160,46 190,56" fill="#c08820" opacity="0.28"/>
  <polygon points="190,56 220,46 206,120 174,120 160,46" fill="#d09020" opacity="0.16"/>
  <polygon points="190,4 220,46 206,120 174,120 160,46" fill="none" stroke="#f0d030" stroke-width="2.2" opacity="0.78"/>

  <!-- Блики на гранях -->
  <path d="M184 12 L169 40" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.58"/>
  <path d="M144 18 L132 44" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.44"/>
  <path d="M195 6 L205 24" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.48"/>

  <!-- Искры -->
  <circle cx="222" cy="36" r="3.5" fill="white" opacity="0.75"/>
  <circle cx="215" cy="18" r="2.2" fill="white" opacity="0.65"/>
  <circle cx="232" cy="60" r="1.8" fill="#fde68a" opacity="0.58"/>
  <path d="M218 24 L221 18 L224 24 L230 27 L224 30 L221 36 L218 30 L212 27Z" fill="white" opacity="0.55"/>
