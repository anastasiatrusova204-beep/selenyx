<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px; height: 512px;
    overflow: hidden;
    background: #000;
  }

  .wrap {
    width: 512px; height: 512px;
    position: relative;
    background:
      radial-gradient(ellipse at 30% 25%, rgba(60,30,100,0.6) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, rgba(20,40,80,0.5) 0%, transparent 50%),
      #050510;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* Звёздное поле */
  .stars-layer {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 40px 60px, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 120px 30px, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 200px 90px, rgba(255,255,255,0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at 300px 50px, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 420px 80px, rgba(255,255,255,0.75) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 470px 140px, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 60px 180px, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 160px 200px, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 390px 170px, rgba(255,255,255,0.95) 0%, transparent 100%),
      radial-gradient(1px 1px at 490px 220px, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30px 300px, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 100px 380px, rgba(255,255,255,0.85) 0%, transparent 100%),
      radial-gradient(1px 1px at 450px 320px, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 370px 400px, rgba(255,255,255,0.75) 0%, transparent 100%),
      radial-gradient(1px 1px at 80px 460px, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 250px 480px, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 430px 470px, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 180px 140px, rgba(200,210,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 340px 260px, rgba(200,210,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 70px 120px, rgba(255,220,180,0.7) 0%, transparent 100%);
  }

  /* Млечный путь — слабая полоса */
  .milky-way {
    position: absolute; inset: 0;
    background: linear-gradient(
      125deg,
      transparent 20%,
      rgba(100,80,160,0.08) 35%,
      rgba(120,100,180,0.12) 45%,
      rgba(100,80,160,0.08) 55%,
      transparent 70%
    );
  }

  /* Сфера — купол */
  .sphere {
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    border: 1px solid rgba(150,180,255,0.2);
    background: radial-gradient(
      ellipse at 35% 30%,
      rgba(80,60,140,0.15) 0%,
      rgba(40,30,80,0.08) 50%,
      transparent 70%
    );
    box-shadow:
      inset 0 0 60px rgba(100,120,255,0.06),
      0 0 40px rgba(100,120,255,0.05);
  }

  /* Экватор сферы */
  .sphere::after {
    content: '';
    position: absolute;
    top: 50%; left: 5%;
    width: 90%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(150,180,255,0.25), rgba(150,180,255,0.35), rgba(150,180,255,0.25), transparent);
    transform: translateY(-50%);
  }

  /* Меридиан */
  .sphere::before {
    content: '';
    position: absolute;
    top: 5%; left: 50%;
    width: 1px; height: 90%;
    background: linear-gradient(180deg, transparent, rgba(150,180,255,0.2), rgba(150,180,255,0.3), rgba(150,180,255,0.2), transparent);
    transform: translateX(-50%);
  }

  /* Луна */
  .moon-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -65%);
    z-index: 4;
  }
  .moon {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffe082, #ffd54f, #e6b800);
    box-shadow:
      0 0 20px rgba(255,213,79,0.7),
      0 0 50px rgba(255,213,79,0.35),
      0 0 100px rgba(255,193,7,0.15);
    position: relative;
    z-index: 2;
  }
  /* Серп */
  .moon::after {
    content: '';
    position: absolute;
    top: -5px; left: 24px;
    width: 82px; height: 82px;
    border-radius: 50%;
    background: radial-gradient(ellipse at 30% 25%, rgba(60,30,100,0.95) 0%, #080818 100%);
    z-index: 3;
  }

  /* Траектория луны — дуга */
  .trajectory {
    position: absolute;
    width: 300px; height: 150px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    border: 1px dashed rgba(200,200,255,0.2);
    border-bottom: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -30%);
    z-index: 1;
  }

  /* Линия к луне из центра */
  .moon-line {
    position: absolute;
    width: 2px; height: 130px;
    background: linear-gradient(180deg, rgba(255,213,79,0.6), rgba(255,213,79,0.1));
    top: 50%; left: 50%;
    transform: translate(-50%, -100%) rotate(-15deg);
    transform-origin: bottom center;
    z-index: 1;
  }

  /* Центральная точка */
  .center-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(200,210,255,0.8);
    box-shadow: 0 0 8px rgba(200,210,255,0.6);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
  }

  /* Текст */
  .label-wrap {
    position: absolute;
    bottom: 70px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
  }
  .title {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 42px;
    font-weight: normal;
    color: #f3ece3;
    letter-spacing: 10px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(255,213,79,0.4), 0 2px 20px rgba(0,0,0,0.8);
  }
  .sub {
    font-family: 'Georgia', serif;
    font-size: 13px;
    color: rgba(200,210,255,0.45);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="stars-layer"></div>
  <div class="milky-way"></div>

  <div class="sphere"></div>
  <div class="trajectory"></div>
  <div class="moon-line"></div>
  <div class="center-dot"></div>

  <div class="moon-wrap">
    <div class="moon"></div>
  </div>

  <div class="label-wrap">
    <div class="title">Selenyx</div>
    <div class="sub">лунный навигатор</div>
  </div>
</div>
</body>
</html>
