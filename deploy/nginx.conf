# nginx.conf — Selenyx Beget VPS (актуально 2026-04-02)
# Текущее состояние на сервере: работает по IP 45.9.43.149 без домена
#
# КОГДА ДОМЕН ГОТОВ (selenyx.ru):
#   1. Замени _ на selenyx.ru www.selenyx.ru в server_name
#   2. Раскомментируй SSL-блок
#   3. certbot --nginx -d selenyx.ru -d www.selenyx.ru
#   4. nginx -t && systemctl reload nginx
#   5. В .env добавь: TG_APP_URL=https://selenyx.ru/app/
#   6. systemctl restart selenyx

# ── ТЕКУЩИЙ КОНФИГ (HTTP по IP, без домена) ──────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Лендинг (витрина для новых пользователей)
    location / {
        root /home/selenyx/landing;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Mini App
    location /app/ {
        alias /home/selenyx/miniapp/;
        index index.html;
        try_files $uri $uri/ /home/selenyx/miniapp/index.html;
    }

    # API бота
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    location ~ /\. { deny all; }
}

