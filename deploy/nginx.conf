# nginx.conf — Selenyx Beget VPS
# Замени YOUR_BEGET_DOMAIN на реальный домен (например: selenyx.beget.tech)
# После замены: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_BEGET_DOMAIN;

    # HTTP → HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_BEGET_DOMAIN;

    # SSL (certbot заполнит автоматически)
    ssl_certificate     /etc/letsencrypt/live/YOUR_BEGET_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_BEGET_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Таймауты (бот может отвечать медленно при первом запросе)
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    10s;

    # Проксирование API на порт 8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # Запрещаем доступ к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
