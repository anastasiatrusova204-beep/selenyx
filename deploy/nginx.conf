server {
    listen 80;
    server_name YOUR_BEGET_DOMAIN.beget.tech;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_BEGET_DOMAIN.beget.tech;

    ssl_certificate     /etc/letsencrypt/live/YOUR_BEGET_DOMAIN.beget.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_BEGET_DOMAIN.beget.tech/privkey.pem;

    # Проксирование API на порт 8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
    }
}
