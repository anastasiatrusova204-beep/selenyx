<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="nmoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="60%" stop-color="#18102e"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </radialGradient>
    <radialGradient id="nhalo" cx="50%" cy="50%" r="50%">
      <stop offset="65%" stop-color="#302050" stop-opacity="0"/>
      <stop offset="100%" stop-color="#302050" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="nf"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="nstar"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Subtle outer halo -->
  <circle cx="150" cy="150" r="140" fill="url(#nhalo)" filter="url(#nf)"/>
  <!-- Ring -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="#504060" stroke-width="0.8" opacity="0.3"/>

  <!-- Moon disc (dark) -->
  <circle cx="150" cy="150" r="90" fill="url(#nmoon)"/>
  <circle cx="150" cy="150" r="90" fill="none" stroke="#504060" stroke-width="1" opacity="0.35"/>

  <!-- Stars around moon -->
  <circle cx="62"  cy="72"  r="3"   fill="#c8c0e0" filter="url(#nstar)" opacity="0.75"/>
  <circle cx="240" cy="58"  r="2.5" fill="#d8d0f0" filter="url(#nstar)" opacity="0.7"/>
  <circle cx="258" cy="170" r="3.2" fill="#c0b8e0" filter="url(#nstar)" opacity="0.72"/>
  <circle cx="45"  cy="210" r="2.8" fill="#d0c8f0" filter="url(#nstar)" opacity="0.68"/>
  <circle cx="150" cy="30"  r="3"   fill="#d8d0f0" filter="url(#nstar)" opacity="0.7"/>
  <circle cx="272" cy="115" r="2"   fill="#c8c0e0" opacity="0.6"/>
  <circle cx="38"  cy="148" r="2.2" fill="#c8c0e0" opacity="0.58"/>
  <circle cx="200" cy="260" r="2.5" fill="#c8c0e0" opacity="0.6"/>
  <circle cx="90"  cy="260" r="2"   fill="#c0b8e0" opacity="0.55"/>
  <circle cx="268" cy="230" r="1.8" fill="#d0c8f0" opacity="0.55"/>

  <!-- Tiny stars -->
  <circle cx="110" cy="48"  r="1.2" fill="#b8b0d8" opacity="0.5"/>
  <circle cx="195" cy="38"  r="1"   fill="#b8b0d8" opacity="0.48"/>
  <circle cx="280" cy="80"  r="1.3" fill="#b8b0d8" opacity="0.45"/>
  <circle cx="20"  cy="180" r="1.2" fill="#b8b0d8" opacity="0.45"/>
  <circle cx="175" cy="275" r="1.5" fill="#b8b0d8" opacity="0.45"/>

  <!-- 4-pointed star accent -->
  <path d="M245 52 L247 44 L249 52 L257 54 L249 56 L247 64 L245 56 L237 54Z"
        fill="#e0d8f8" opacity="0.6"/>
</svg>
