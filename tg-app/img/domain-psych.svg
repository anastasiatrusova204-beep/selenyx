<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <defs>
    <radialGradient id="neb1" cx="55%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#a070e0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#4828a8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#160850" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="30%" cy="68%" r="48%">
      <stop offset="0%" stop-color="#6840c8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#180660" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="80%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#8050d0" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#200870" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="star"><feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigstar"><feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Туманность / атмосфера -->
  <ellipse cx="148" cy="65" rx="105" ry="78" fill="url(#neb1)"/>
  <ellipse cx="112" cy="88" rx="72"  ry="55" fill="url(#neb2)"/>
  <ellipse cx="195" cy="38" rx="55"  ry="42" fill="url(#neb3)"/>

  <!-- Линии созвездия -->
  <line x1="100" y1="38"  x2="148" y2="18"  stroke="#9080d8" stroke-width="1.0" opacity="0.48"/>
  <line x1="148" y1="18"  x2="188" y2="44"  stroke="#9080d8" stroke-width="1.0" opacity="0.48"/>
  <line x1="188" y1="44"  x2="175" y2="88"  stroke="#9080d8" stroke-width="1.0" opacity="0.45"/>
  <line x1="175" y1="88"  x2="132" y2="106" stroke="#9080d8" stroke-width="1.0" opacity="0.43"/>
  <line x1="132" y1="106" x2="100" y2="38"  stroke="#7060b8" stroke-width="0.7" opacity="0.28"/>
  <line x1="148" y1="18"  x2="175" y2="88"  stroke="#7060b8" stroke-width="0.6" opacity="0.20"/>
  <line x1="100" y1="38"  x2="175" y2="88"  stroke="#7060b8" stroke-width="0.5" opacity="0.16"/>

  <!-- Звёзды созвездия (главные) -->
  <circle cx="100" cy="38"  r="6"   fill="#d0c0f8" filter="url(#bigstar)" opacity="0.88"/>
  <circle cx="148" cy="18"  r="4.5" fill="#e0d0ff"  filter="url(#star)"   opacity="0.84"/>
  <circle cx="188" cy="44"  r="7.5" fill="#c8b8f0"  filter="url(#bigstar)" opacity="0.82"/>
  <circle cx="175" cy="88"  r="5"   fill="#d0c0f8"  filter="url(#star)"   opacity="0.78"/>
  <circle cx="132" cy="106" r="3.8" fill="#c8b8f0"  filter="url(#star)"   opacity="0.75"/>

  <!-- Дополнительные звёзды созвездия -->
  <circle cx="120" cy="68"  r="2.2" fill="#b8a8e8"  opacity="0.55"/>
  <circle cx="160" cy="56"  r="2"   fill="#c0b0f0"  opacity="0.50"/>

  <!-- Фоновые мелкие звёздочки (рассеянные) -->
  <circle cx="82"  cy="18"  r="1.2" fill="#d8d0f8" opacity="0.55"/>
  <circle cx="114" cy="8"   r="1.0" fill="#d8d0f8" opacity="0.52"/>
  <circle cx="168" cy="8"   r="1.5" fill="#d8d0f8" opacity="0.54"/>
  <circle cx="210" cy="22"  r="1.2" fill="#d8d0f8" opacity="0.50"/>
  <circle cx="228" cy="60"  r="1.0" fill="#d8d0f8" opacity="0.46"/>
  <circle cx="218" cy="105" r="1.3" fill="#d8d0f8" opacity="0.46"/>
  <circle cx="88"  cy="125" r="1.5" fill="#d8d0f8" opacity="0.48"/>
  <circle cx="80"  cy="76"  r="1.0" fill="#d8d0f8" opacity="0.44"/>
  <circle cx="76"  cy="100" r="1.2" fill="#d8d0f8" opacity="0.42"/>
  <circle cx="106" cy="145" r="1.0" fill="#d8d0f8" opacity="0.40"/>
  <circle cx="140" cy="138" r="1.2" fill="#c8c0f0" opacity="0.44"/>
  <circle cx="200" cy="132" r="1.0" fill="#d0c8f8" opacity="0.42"/>

  <!-- Большая акцентная 4-лучевая звезда -->
  <path d="M190 36 L193 26 L196 36 L206 39 L196 42 L193 52 L190 42 L180 39Z"
        fill="#e8d8ff" filter="url(#star)" opacity="0.78"/>
</svg>
