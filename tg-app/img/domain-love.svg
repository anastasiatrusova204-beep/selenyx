<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <defs>
    <radialGradient id="mg" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#f8c0d8"/>
      <stop offset="42%" stop-color="#cc6090"/>
      <stop offset="80%" stop-color="#8a2858"/>
      <stop offset="100%" stop-color="#50102e"/>
    </radialGradient>
    <radialGradient id="atm" cx="58%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#e880b0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a1848" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#e06090" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f090c0" stop-opacity="0.30"/>
    </radialGradient>
    <filter id="gf"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="gf2"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="star"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Атмосфера -->
  <ellipse cx="155" cy="62" rx="102" ry="80" fill="url(#atm)"/>
  <circle cx="160" cy="65" r="65" fill="url(#halo)" filter="url(#gf)"/>

  <!-- Тёмная основа луны -->
  <circle cx="162" cy="65" r="60" fill="#200818" opacity="0.40"/>

  <!-- Серп луны -->
  <path d="M170 14 C206 32 212 76 196 102 C180 128 148 134 126 120 C150 108 166 84 166 58 C166 34 152 18 134 14 C147 7 160 6 170 14Z"
        fill="url(#mg)" opacity="0.85"/>

  <!-- Текстура поверхности луны -->
  <circle cx="150" cy="42" r="10" fill="#6a1840" opacity="0.18"/>
  <circle cx="168" cy="70" r="14" fill="#501030" opacity="0.14"/>
  <circle cx="155" cy="92" r="9"  fill="#6a1840" opacity="0.16"/>

  <!-- Ободок -->
  <path d="M170 14 C206 32 212 76 196 102 C180 128 148 134 126 120 C150 108 166 84 166 58 C166 34 152 18 134 14 C147 7 160 6 170 14Z"
        fill="none" stroke="#f8c0d8" stroke-width="1" opacity="0.42"/>

  <!-- Роза / цветок -->
  <ellipse cx="108" cy="100" rx="11" ry="8" fill="#c06080" opacity="0.58" transform="rotate(-25 108 100)"/>
  <ellipse cx="116" cy="94"  rx="10" ry="7" fill="#d07090" opacity="0.52" transform="rotate(18 116 94)"/>
  <ellipse cx="104" cy="92"  rx="9"  ry="7" fill="#b85070" opacity="0.50" transform="rotate(-42 104 92)"/>
  <ellipse cx="114" cy="104" rx="9"  ry="6" fill="#cc7090" opacity="0.48" transform="rotate(32 114 104)"/>
  <ellipse cx="106" cy="96"  rx="8"  ry="6" fill="#d080a0" opacity="0.45" transform="rotate(-10 106 96)"/>
  <circle  cx="110" cy="98"  r="5.5" fill="#f0b0c8" opacity="0.55"/>
  <circle  cx="110" cy="98"  r="2.8" fill="#fff0f8" opacity="0.72"/>

  <!-- Лепестки разлетевшиеся -->
  <ellipse cx="92" cy="88"  rx="5"  ry="3" fill="#d07090" opacity="0.38" transform="rotate(-30 92 88)"/>
  <ellipse cx="128" cy="88" rx="4"  ry="3" fill="#c06080" opacity="0.35" transform="rotate(20 128 88)"/>
  <ellipse cx="118" cy="114" rx="4" ry="2.5" fill="#b85070" opacity="0.32" transform="rotate(10 118 114)"/>

  <!-- Звёзды (с эффектом свечения) -->
  <circle cx="104" cy="24" r="3.8" fill="#f8c0d8" filter="url(#star)" opacity="0.82"/>
  <circle cx="188" cy="20" r="2.8" fill="#fce8f0" filter="url(#star)" opacity="0.75"/>
  <circle cx="208" cy="55" r="3.2" fill="#f8c0d8" filter="url(#star)" opacity="0.70"/>
  <circle cx="95"  cy="55" r="2.2" fill="#f0a0c0" opacity="0.62"/>
  <circle cx="205" cy="92" r="2.2" fill="#f0a0c0" opacity="0.58"/>

  <!-- 4-лучевая звезда акцент -->
  <path d="M195 16 L197.5 8 L200 16 L208 18.5 L200 21 L197.5 29 L195 21 L187 18.5Z"
        fill="#fce8f0" filter="url(#gf2)" opacity="0.72"/>
</svg>
